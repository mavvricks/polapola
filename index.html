<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLA PLANNER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- HTML2PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <meta name="description" content="POLA PLANNER — Academic To-Do & Deadlines Manager">
    <meta name="theme-color" content="#064e3b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="POLA PLANNER">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="icon" type="image/png" href="icons/icon-192.png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-main">
                <div class="greeting">
                    <h1>Welcome back, <span id="user-name">Pola</span> <i data-lucide="hand" class="wave-icon"></i></h1>
                    <p id="current-date-display" class="subtitle">Loading today...</p>
                    <div id="task-counters" class="task-counters">
                        <span id="count-todo" class="badge todo">0 To-Dos</span>
                        <span id="count-due" class="badge due">0 Dues</span>
                    </div>
                </div>
                <div class="header-actions">
                    <!-- Primary: View Switching -->
                    <div class="view-toggle">
                        <button id="btn-list-view" class="toggle-btn active" title="List View">
                            <i data-lucide="list-todo"></i>
                            <span>List</span>
                        </button>
                        <button id="btn-calendar-view" class="toggle-btn" title="Calendar View">
                            <i data-lucide="calendar"></i>
                            <span>Calendar</span>
                        </button>
                    </div>

                    <!-- Secondary: Export Actions -->
                    <div class="action-group">
                        <button id="btn-copy-tasks" class="icon-btn" title="Copy Tasks to Clipboard">
                            <i data-lucide="clipboard-copy"></i>
                        </button>
                        <button id="btn-export-pdf" class="icon-btn" title="Export to PDF">
                            <i data-lucide="download"></i>
                        </button>
                    </div>

                    <!-- Tertiary: Utility -->
                    <div class="action-group">
                        <button id="btn-sync" class="icon-btn" title="Sync with Google Sheets">
                            <i data-lucide="refresh-cw"></i>
                        </button>
                        <button id="btn-settings" class="icon-btn" title="Settings">
                            <i data-lucide="settings"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="controls-bar">
                <div class="search-wrapper">
                    <input type="text" id="search-input" placeholder="Search tasks, descriptions...">
                </div>
                <div class="filter-wrapper">
                    <div class="select-box">
                        <select id="filter-type">
                            <option value="all">All Types</option>
                            <option value="todo">To-Do</option>
                            <option value="due">Dues</option>
                        </select>
                    </div>
                    <div class="select-box">
                        <select id="filter-subject">
                            <option value="all">All Subjects</option>
                            <!-- Populated dynamically -->
                        </select>
                    </div>
                </div>
            </div>
        </header>

        <main class="app-main">
            <!-- Calendar View -->
            <section id="calendar-view" class="view-section">
                <div class="calendar-header">
                    <div class="calendar-nav">
                        <button id="btn-prev-month" class="icon-btn"><i data-lucide="chevron-left"></i></button>
                        <h2 id="calendar-month-year">Month Year</h2>
                        <button id="btn-next-month" class="icon-btn"><i data-lucide="chevron-right"></i></button>
                    </div>
                    <button id="btn-today" class="secondary-btn">Today</button>
                </div>
                <div class="calendar-wrapper">
                    <div class="calendar-grid-header">
                        <div>Sun</div>
                        <div>Mon</div>
                        <div>Tue</div>
                        <div>Wed</div>
                        <div>Thu</div>
                        <div>Fri</div>
                        <div>Sat</div>
                    </div>
                    <div id="calendar-grid" class="calendar-grid">
                        <!-- Days generated dynamically -->
                    </div>
                </div>
            </section>

            <!-- List View -->
            <section id="list-view" class="view-section active">
                <div class="list-header"
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
                    <div class="calendar-nav">
                        <button id="btn-prev-week" class="icon-btn"><i data-lucide="chevron-left"></i></button>
                        <h2 id="list-week-range">This Week</h2>
                        <button id="btn-next-week" class="icon-btn"><i data-lucide="chevron-right"></i></button>
                    </div>
                    <div style="display: flex; gap: 0.5rem;">
                        <button id="btn-today-list" class="secondary-btn">This Week</button>
                        <button id="btn-add-task-list" class="primary-btn">
                            <i data-lucide="plus"></i> Add Task
                        </button>
                    </div>
                </div>
                <div id="task-list" class="task-list">
                    <!-- List items generated dynamically -->
                </div>
            </section>
        </main>
    </div>

    <!-- Modals -->
    <!-- Task/Day Modal -->
    <div id="day-modal" class="modal-overlay">
        <div class="modal task-modal">
            <div class="modal-header">
                <h3 id="modal-date-title">Date</h3>
                <button class="close-modal icon-btn"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <div id="day-tasks-list" class="day-tasks">
                    <!-- Tasks for this day injected here -->
                </div>

                <div class="form-divider">
                    <span id="form-heading">Add New Task</span>
                </div>

                <form id="task-form">
                    <input type="hidden" id="task-id">
                    <div class="form-group">
                        <label for="task-title">Title <span class="required">*</span></label>
                        <input type="text" id="task-title" placeholder="e.g. Chapter 4 Reading" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group half">
                            <label>Type</label>
                            <div class="radio-group">
                                <label class="radio-label">
                                    <input type="radio" name="task-type" value="todo" checked>
                                    <span class="radio-custom"></span>
                                    To-Do
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="task-type" value="due">
                                    <span class="radio-custom"></span>
                                    Dues
                                </label>
                            </div>
                        </div>
                        <div class="form-group half">
                            <label for="task-date">Date <span class="required">*</span></label>
                            <input type="date" id="task-date" required onclick="this.showPicker && this.showPicker()">
                        </div>
                    </div>

                    <div class="form-row time-row" style="display:flex; gap: 1rem;">
                        <div class="form-group half">
                            <label for="task-start-time">Start Time (Optional)</label>
                            <input type="time" id="task-start-time" onclick="this.showPicker && this.showPicker()">
                        </div>
                        <div class="form-group half">
                            <label for="task-deadline-time">Deadline (Optional)</label>
                            <input type="time" id="task-deadline-time" onclick="this.showPicker && this.showPicker()">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="task-subject">Subject <span class="required">*</span></label>
                        <div class="subject-select-wrapper">
                            <select id="task-subject" required>
                                <option value="" disabled selected>Select a subject...</option>
                                <!-- Populated dynamically -->
                            </select>
                            <button type="button" id="btn-new-subject" class="icon-btn tooltip" title="Add Subject">
                                <i data-lucide="plus-circle"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="task-desc">Description</label>
                        <textarea id="task-desc" rows="3" placeholder="Add any extra details..."></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" id="btn-cancel-task" class="secondary-btn">Clear</button>
                        <button type="submit" class="primary-btn">Save Task</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Add Subject Modal -->
    <div id="subject-modal" class="modal-overlay">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h3>New Subject</h3>
                <button class="close-subject-modal icon-btn"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <form id="subject-form">
                    <div class="form-group">
                        <label for="new-subject-name">Subject Name <span class="required">*</span></label>
                        <input type="text" id="new-subject-name" placeholder="e.g. Software Eng" required>
                    </div>
                    <div class="form-group">
                        <label for="new-subject-color">Color <span class="required">*</span></label>
                        <div class="color-picker-wrapper">
                            <input type="color" id="new-subject-color" value="#3b82f6" required>
                            <span id="color-hex-display">#3b82f6</span>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="secondary-btn close-subject-modal">Cancel</button>
                        <button type="submit" class="primary-btn">Add Subject</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div id="confirm-modal" class="modal-overlay">
        <div class="modal modal-sm">
            <div class="modal-body confirm-body">
                <div class="warning-icon">
                    <i data-lucide="alert-triangle"></i>
                </div>
                <h3 id="confirm-modal-title">Delete Task?</h3>
                <p id="confirm-modal-desc">Are you sure you want to delete <strong>this item</strong>? This action cannot
                    be undone.</p>
                <div class="form-actions confirm-actions">
                    <button type="button" id="btn-cancel-delete" class="secondary-btn">Cancel</button>
                    <button type="button" id="btn-confirm-delete" class="danger-btn">Delete Task</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>App Settings</h3>
                <button class="close-settings icon-btn"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body" style="padding-bottom: 0.5rem;">
                <!-- View Preferences -->
                <div class="form-divider" style="margin-top:0;">
                    <span>View Preferences</span>
                </div>
                <div style="margin-bottom: 1.5rem; display:flex; gap: 1rem; align-items:center;">
                    <label class="radio-label" style="margin-bottom: 0;">
                        <input type="checkbox" id="setting-hide-completed" class="task-checkbox" style="margin-top:0;">
                        <span style="margin-left: 0.5rem; font-weight: 500;">Hide Completed Tasks</span>
                    </label>
                </div>

                <!-- Subject Management -->
                <div class="form-divider">
                    <span>Manage Subjects</span>
                </div>

                <!-- Add Subject Inline -->
                <div
                    style="background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: 1rem; margin-bottom: 1.5rem;">
                    <form id="settings-add-subject-form" style="display: flex; gap: 1rem; align-items: flex-end;">
                        <div class="form-group" style="margin-bottom: 0; flex: 1;">
                            <label style="font-size: 0.8rem; margin-bottom: 0.25rem;">New Subject Name</label>
                            <input type="text" id="settings-new-subj-name" placeholder="e.g. Thesis" required
                                style="padding: 0.4rem 0.8rem;">
                        </div>
                        <div class="form-group" style="margin-bottom: 0; width: 80px;">
                            <label style="font-size: 0.8rem; margin-bottom: 0.25rem;">Color</label>
                            <div class="color-picker-wrapper" style="height: 38px; padding: 0;">
                                <input type="color" id="settings-new-subj-color" value="#10b981" required
                                    style="width:100%; height:100%; cursor:pointer;">
                            </div>
                        </div>
                        <button type="submit" class="primary-btn"
                            style="padding: 0.4rem 1rem; height: 38px;">Add</button>
                    </form>
                </div>

                <label
                    style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; display:block;">Existing
                    Subjects</label>
                <div id="settings-subjects-list"
                    style="display: flex; flex-direction: column; gap: 0.75rem; max-height: 250px; overflow-y: auto; padding-right: 0.5rem;">
                    <!-- Subject rows inserted here -->
                </div>

            </div>
            <div class="modal-header"
                style="border-top: 1px solid rgba(16, 185, 129, 0.2); border-bottom: none; border-radius: 0 0 var(--radius-lg) var(--radius-lg); justify-content: flex-end; padding-top: 1rem;">
                <button type="button" class="secondary-btn close-settings">Done</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="script.js?v=2"></script>
    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('SW registered'))
                .catch(err => console.warn('SW registration failed:', err));
        }
    </script>
</body>

</html>
